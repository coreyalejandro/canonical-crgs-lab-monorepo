  <text x="100" y="609" font-family="JetBrains Mono" font-size="15" letter-spacing="1.5" fill="#EDE4D4"><tspan fill="#C77C50">CRGS //</tspan> runtime-first   ·   06-layer stack   ·   07 research programs   ·   CRGS-LAB-001</text>
