  <text x="80" y="312" font-family="Fraunces" font-size="68" font-weight="600" fill="#1D1813">Observability <tspan font-style="italic" fill="#8C4E34">describes</tspan></text>
  <text x="80" y="388" font-family="Fraunces" font-size="68" font-weight="600" fill="#1D1813">behavior. We <tspan font-style="italic" fill="#8C4E34">govern</tspan> it.</text>

  <!-- sub -->
