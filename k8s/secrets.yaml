---
# k8s/secrets.yaml — Kubernetes Secret Template
#
# IMPORTANT: This file contains BASE64-ENCODED placeholder values.
# Replace each value with the real base64-encoded secret before applying.
#
# Encode a value:
#   echo -n "your-actual-value" | base64
#
# Apply BEFORE production-stack.yaml and math-sandbox.yaml:
#   kubectl apply -f k8s/secrets.yaml
#
# NEVER commit a secrets.yaml with real values. This template file is
# safe to commit — all values are placeholders.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: crgs-lab-secrets
  namespace: crgs-lab
  labels:
    governed-by: tlc-2.0
type: Opaque
data:
  # echo -n "your-openai-key" | base64
  OPENAI_API_KEY: REPLACE_WITH_BASE64_ENCODED_OPENAI_KEY

  # echo -n "neo4j/StrictPassword123!" | base64
  NEO4J_AUTH: bmVvNGovU3RyaWN0UGFzc3dvcmQxMjMh

  # echo -n "StrictPassword123!" | base64
  NEO4J_PASSWORD: U3RyaWN0UGFzc3dvcmQxMjMh
