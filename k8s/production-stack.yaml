---
# k8s/production-stack.yaml — CRGS Lab Production Kubernetes Manifests
#
# Phase 6 Build Contract — Section II
# Governed by: The Living Constitution 2.0 — Sociotechnical Constitution v2.0.0
#
# Manifests defined here:
#   1. Namespace          — crgs-lab (all resources scoped here)
#   2. Neo4j StatefulSet  — persistent Knowledge Graph, 1 replica
#   3. Neo4j Service      — internal ClusterIP on 7687/7474
#   4. Engine Deployment  — constitutional engine + Streamlit UI, 2 replicas
#   5. Engine Service     — ClusterIP for internal routing
#   6. Enterprise LB      — AWS-backed LoadBalancer Service on port 80→8501
#
# Secrets (OPENAI_API_KEY, NEO4J_PASSWORD) come from k8s/secrets.yaml — apply
# that first.
#
# Before applying:
#   1. Run terraform apply — grab ecr_repository_url from outputs
#   2. Replace YOUR_AWS_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com below
#   3. kubectl apply -f k8s/secrets.yaml
#   4. kubectl apply -f k8s/production-stack.yaml
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Namespace
metadata:
  name: crgs-lab
  labels:
    governed-by: tlc-2.0
    environment: production

---
# ── Neo4j StatefulSet — persistent Knowledge Graph ────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: knowledge-graph
  namespace: crgs-lab
spec:
  serviceName: "neo4j-service"
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
      - name: neo4j
        image: neo4j:5.18.0-community
        env:
        - name: NEO4J_AUTH
          valueFrom:
            secretKeyRef:
              name: crgs-lab-secrets
              key: NEO4J_AUTH
        - name: NEO4J_ACCEPT_LICENSE_AGREEMENT
          value: "yes"
        ports:
        - name: bolt
          containerPort: 7687
        - name: http
          containerPort: 7474
        volumeMounts:
        - name: neo4j-data
          mountPath: /data
        readinessProbe:
          tcpSocket:
            port: 7687
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2"
  volumeClaimTemplates:
  - metadata:
      name: neo4j-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 50Gi

---
# Neo4j ClusterIP Service
apiVersion: v1
kind: Service
metadata:
  name: neo4j-service
  namespace: crgs-lab
spec:
  type: ClusterIP
  selector:
    app: neo4j
  ports:
  - name: bolt
    port: 7687
    targetPort: 7687
  - name: http
    port: 7474
    targetPort: 7474

---
# ── Constitutional Engine Deployment ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: constitutional-engine
  namespace: crgs-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-engine
  template:
    metadata:
      labels:
        app: agent-engine
    spec:
      containers:
      - name: engine
        # Replace with your ECR URL from: terraform output ecr_repository_url
        image: YOUR_AWS_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/constitutional_engine:latest
        imagePullPolicy: Always
        env:
        - name: NEO4J_URI
          value: "bolt://neo4j-service:7687"
        - name: NEO4J_USER
          value: "neo4j"
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: crgs-lab-secrets
              key: NEO4J_PASSWORD
        - name: SANDBOX_URL
          value: "http://math-sandbox-service:8000/execute"
        - name: LLM_TEMPERATURE
          value: "0.0"
        - name: ENFORCE_STRICT_CONSTITUTION
          value: "True"
        - name: MAX_REVISION_LOOPS
          value: "3"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: crgs-lab-secrets
              key: OPENAI_API_KEY
        ports:
        - name: dashboard
          containerPort: 8501
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 20
          periodSeconds: 10
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2"

---
# Engine ClusterIP Service (internal routing from LB)
apiVersion: v1
kind: Service
metadata:
  name: constitutional-engine-service
  namespace: crgs-lab
spec:
  type: ClusterIP
  selector:
    app: agent-engine
  ports:
  - port: 8501
    targetPort: 8501

---
# ── Enterprise Load Balancer — public dashboard access ────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: enterprise-dashboard-lb
  namespace: crgs-lab
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
spec:
  type: LoadBalancer
  selector:
    app: agent-engine
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8501
