version: '3.8'

services:
  knowledge_graph:
    image: neo4j:5.18.0-community
    container_name: constitutional_neo4j
    environment:
      - NEO4J_AUTH=neo4j/StrictPassword123!
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  # Isolated execution environment for neuro-symbolic verification
  math_sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile.sandbox
    container_name: constitutional_sandbox
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    # Network restriction: Sandbox cannot access external internet, only internal network
    networks:
      - internal_mesh

  constitutional_engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: constitutional_agent_loop
    depends_on:
      - knowledge_graph
      - math_sandbox
    environment:
      - NEO4J_URI=bolt://knowledge_graph:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=StrictPassword123!
      - SANDBOX_URL=http://math_sandbox:8000/execute
      - LLM_TEMPERATURE=0.0
      - ENFORCE_STRICT_CONSTITUTION=True
      - MAX_REVISION_LOOPS=3
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    networks:
      - internal_mesh

  # Isolated LaTeX compilation engine (Tectonic via TexLive)
  pdf_compiler:
    image: texlive/texlive:latest
    container_name: constitutional_pdf_engine
    volumes:
      - ./output:/workspace
    working_dir: /workspace
    # Keeps container alive to accept tectonic exec commands
    command: tail -f /dev/null
    networks:
      - internal_mesh

networks:
  internal_mesh:
    driver: bridge

volumes:
  neo4j_data:
