name: v15 Constitutional Invariant Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  constitutional-tests:
    name: Constitutional Invariant CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pydantic langgraph langchain-openai pytest

      - name: Run v15 constitutional invariant tests
        run: pytest tests/test_v15_invariants.py -v
